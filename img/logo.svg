<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Logo Panadería">
  <defs>
    <linearGradient id="panG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A940"/>
      <stop offset="100%" style="stop-color:#C8841A"/>
    </linearGradient>
    <filter id="panShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#4A2008" flood-opacity="0.22"/>
    </filter>
  </defs>
  <!-- Fondo más claro que la barra para que se note el borde -->
  <circle cx="60" cy="60" r="54" fill="#FFFEF9" stroke="url(#panG)" stroke-width="4" filter="url(#panShadow)"/>
  <ellipse cx="60" cy="62" rx="36" ry="26" fill="#C8841A"/>
  <ellipse cx="60" cy="58" rx="32" ry="20" fill="#F5DEB3"/>
  <path d="M34 52 Q60 36 86 52" fill="none" stroke="#6B3410" stroke-width="3.5" stroke-linecap="round"/>
</svg>
